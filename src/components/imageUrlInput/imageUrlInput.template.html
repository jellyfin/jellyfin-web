<div class="formDialogHeader">
    <button is="paper-icon-button-light" class="btnCancel autoSize" tabindex="-1" title="${ButtonBack}"><span class="material-icons arrow_back" aria-hidden="true"></span></button>
    <h3 class="formDialogHeaderTitle">${LoadImageFromLink}</h3>
</div>

<div class="formDialogContent">
    <div class="dialogContentInner">
        <div style="margin: 20px 0;">
            <input id="imageUrlInput" type="text" class="emby-input" placeholder="https://example.com/image.jpg" style="width: 100%; padding: 8px; box-sizing: border-box;" />
        </div>
    </div>
</div>

<div class="formDialogFooter">
    <button is="emby-button" type="button" class="btnDownloadImageUrl raised">
        <span>${Download}</span>
    </button>
</div>
