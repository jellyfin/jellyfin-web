<div id="wizardFFmpegPage" data-role="page" class="page standalonePage wizardPage">
    <div class="padded-left padded-right padded-top">
        <div class="ui-corner-all ui-shadow wizardContent">
            <form class="wizardFFmpegForm">
                <h1>${HeaderFFmpegSetup}</h1>
                <p style="margin:1.5em 0;">${FFmpegSetupHelp}</p>

                <div class="inputContainer">
                    <input is="emby-input" type="text" id="txtFFmpegPath" label="${LabelffmpegPath}" />
                    <div class="fieldDescription">${LabelffmpegPathHelp}</div>
                </div>
                <br />

                <div class="wizardNavigation">
                    <button is="emby-button" type="button" class="raised button-cancel" onclick="history.back();">
                        <span class="material-icons arrow_back" aria-hidden="true"></span>
                        <span>${Previous}</span>
                    </button>
                    <button is="emby-button" type="submit" class="raised button-submit">
                        <span>${Next}</span>
                        <span class="material-icons arrow_forward" aria-hidden="true"></span>
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
