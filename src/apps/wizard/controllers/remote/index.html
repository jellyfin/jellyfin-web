<div id="wizardSettingsPage" data-role="page" class="page standalonePage wizardPage">
    <div class="padded-left padded-right padded-top">
        <div class="ui-corner-all ui-shadow wizardContent">
            <form class="wizardSettingsForm">
                <h1>${HeaderConfigureRemoteAccess}</h1>

                <div class="checkboxContainer checkboxContainer-withDescription">
                    <label>
                        <input type="checkbox" is="emby-checkbox" id="chkRemoteAccess" checked />
                        <span>${AllowRemoteAccess}</span>
                    </label>
                    <div class="fieldDescription checkboxFieldDescription">${AllowRemoteAccessHelp}</div>
                </div>

                <div class="checkboxContainer checkboxContainer-withDescription">
                    <label>
                        <input type="checkbox" is="emby-checkbox" id="chkEnableUPnP" />
                        <span>${LabelEnableUPnP}</span>
                    </label>
                    <div class="fieldDescription checkboxFieldDescription">${EnableUPnPHelp}</div>
                </div>

                <div class="checkboxContainer checkboxContainer-withDescription">
                    <label>
                        <input type="checkbox" is="emby-checkbox" id="chkEnableHttps" />
                        <span>${LabelEnableHttps}</span>
                    </label>
                    <div class="fieldDescription checkboxFieldDescription">${LabelEnableHttpsHelp}</div>
                </div>

                <div class="httpsFields hide">
                    <div class="inputContainer">
                        <input is="emby-input" type="number" id="txtHttpsPort" pattern="[0-9]*" min="1" max="65535" step="1" label="${LabelHttpsPort}" />
                        <div class="fieldDescription">${LabelHttpsPortHelp}</div>
                    </div>
                    <div class="inputContainer">
                        <input is="emby-input" type="text" id="txtCertificatePath" label="${LabelCustomCertificatePath}" />
                        <div class="fieldDescription">${LabelCustomCertificatePathHelp}</div>
                    </div>
                </div>

                <div is="emby-collapse" title="${HeaderAdvancedSettings}">
                    <div class="collapseContent">
                        <div class="inputContainer">
                            <input is="emby-input" type="number" id="txtPortNumber" pattern="[0-9]*" min="1" max="65535" step="1" label="${LabelLocalHttpServerPortNumber}" />
                            <div class="fieldDescription">${LabelLocalHttpServerPortNumberHelp}</div>
                        </div>

                        <h2>${HeaderTranscoding}</h2>
                        <p style="margin:1em 0;">${FFmpegSetupHelp}</p>
                        <div class="inputContainer">
                            <input is="emby-input" type="text" id="txtFFmpegPath" label="${LabelffmpegPath}" />
                            <div class="fieldDescription">${LabelffmpegPathHelp}</div>
                        </div>
                    </div>
                </div>
                <br />
                <div class="wizardNavigation">
                    <button is="emby-button" type="button" class="raised button-cancel" onclick="history.back();">
                        <span class="material-icons arrow_back" aria-hidden="true"></span>
                        <span>${Previous}</span>
                    </button>
                    <button is="emby-button" type="submit" class="raised button-submit">
                        <span class="material-icons check" aria-hidden="true"></span>
                        <span>${LabelFinish}</span>
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
