<div id="wizardUsersPage" data-role="page" class="page standalonePage wizardPage">
    <div class="padded-left padded-right padded-top">
        <div class="ui-corner-all ui-shadow wizardContent">
            <div class="verticalSection">
                <h1 class="sectionTitle">${HeaderAdditionalUsers}</h1>
                <p style="margin-top:2em;">${AdditionalUsersIntro}</p>
                <br />

                <div class="addedUsers"></div>

                <form class="wizardAddUserForm">
                    <div class="inputContainer">
                        <input is="emby-input" type="text" id="txtNewUsername" label="${LabelName}" required="required" />
                    </div>
                    <div class="inputContainer">
                        <input is="emby-input" type="password" id="txtNewUserPassword" label="${LabelPassword}" />
                    </div>
                    <button is="emby-button" type="submit" class="raised block">
                        <span class="material-icons person_add" aria-hidden="true"></span>
                        <span>${Add}</span>
                    </button>
                </form>

                <p>${MoreUsersCanBeAddedLater}</p>
            </div>

            <div class="wizardNavigation">
                <button is="emby-button" type="button" class="raised button-cancel" onclick="history.back();">
                    <span class="material-icons arrow_back" aria-hidden="true"></span>
                    <span>${Previous}</span>
                </button>
                <button is="emby-button" type="button" class="raised btnWizardNext button-submit">
                    <span>${Next}</span>
                    <span class="material-icons arrow_forward" aria-hidden="true"></span>
                </button>
            </div>
        </div>
    </div>
</div>
