<div id="wizardLibraryPage" data-role="page" class="page standalonePage wizardPage mediaLibraryPage">
    <div class="padded-left padded-right padded-top">
        <div class="ui-corner-all ui-shadow wizardContent">
            <div>
                <h1 class="wizardLibraryTitle">${HeaderSetupLibrary}</h1>
                <a href="https://jellyfin.org/docs/general/server/libraries" rel="noopener noreferrer" target="_blank" class="clearLink wizardLibraryHelpLink"><button is="emby-button" type="button" class="raised"><span class="material-icons info" aria-hidden="true"></span><span>${Help}</span></button></a>
            </div>
            <br />
            <div id="divVirtualFolders"></div>
            <br />

            <div class="wizardNavigation">
                <button is="emby-button" type="button" class="raised button-cancel btnWizardPrev">
                    <span class="material-icons arrow_back" aria-hidden="true"></span>
                    <span>${Previous}</span>
                </button>
                <button is="emby-button" type="button" class="raised button-submit btnWizardNext">
                    <span class="btnNextLabel">${Next}</span>
                    <span class="material-icons arrow_forward" aria-hidden="true"></span>
                </button>
            </div>
            <div class="wizardProgress"></div>
        </div>
    </div>
</div>
