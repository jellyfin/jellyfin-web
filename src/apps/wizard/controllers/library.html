<div id="wizardLibraryPage" data-role="page" class="page standalonePage wizardPage mediaLibraryPage">
    <div class="padded-left padded-right padded-top">
        <div class="ui-corner-all ui-shadow wizardContent">
            <div>
                <h1 style="display:inline-block;">${HeaderSetupLibrary}</h1>
                <a href="https://jellyfin.org/docs/general/server/libraries" rel="noopener noreferrer" target="_blank" class="clearLink" style="margin-top:-10px;display:inline-block;vertical-align:middle;margin-left:2em;"><button is="emby-button" type="button" class="raised"><span class="material-icons info" aria-hidden="true"></span><span>${Help}</span></button></a>
            </div>
            <br />
            <div id="divVirtualFolders"></div>
            <br />

            <h2>${HeaderPreferredMetadataLanguage}</h2>
            <p class="wizardStepIntro">${DefaultMetadataLangaugeDescription}</p>
            <div class="selectContainer">
                <select is="emby-select" id="selectMetadataLanguage" required="required" label="${LabelLanguage}"></select>
            </div>
            <div class="selectContainer">
                <select is="emby-select" id="selectMetadataCountry" required="required" label="${LabelCountry}"></select>
            </div>
            <br />

            <div class="wizardNavigation">
                <button is="emby-button" type="button" class="raised button-cancel btnWizardPrev">
                    <span class="material-icons arrow_back" aria-hidden="true"></span>
                    <span>${Previous}</span>
                </button>
                <button is="emby-button" type="button" class="raised button-submit btnWizardFinish">
                    <span class="material-icons check" aria-hidden="true"></span>
                    <span>${LabelFinish}</span>
                </button>
            </div>
            <div class="wizardProgress" data-step="6"></div>
        </div>
    </div>
</div>
