<div id="wizardMetadataPage" data-role="page" class="page standalonePage wizardPage">
    <div class="padded-left padded-right padded-top">
        <div class="ui-corner-all ui-shadow wizardContent">
            <form class="wizardMetadataForm">
                <h1>${HeaderPreferredMetadataLanguage}</h1>
                <p class="wizardStepIntro">${DefaultMetadataLangaugeDescription}</p>
                <br />
                <div class="selectContainer">
                    <select is="emby-select" id="selectMetadataLanguage" required="required" label="${LabelLanguage}" aria-label="${LabelLanguage}"></select>
                </div>
                <div class="selectContainer">
                    <select is="emby-select" id="selectMetadataCountry" required="required" label="${LabelCountry}" aria-label="${LabelCountry}"></select>
                </div>
                <br />
                <div class="wizardNavigation">
                    <button is="emby-button" type="button" class="raised button-cancel btnWizardPrev">
                        <span class="material-icons arrow_back" aria-hidden="true"></span>
                        <span>${Previous}</span>
                    </button>
                    <button is="emby-button" type="submit" class="raised button-submit">
                        <span>${Next}</span>
                        <span class="material-icons arrow_forward" aria-hidden="true"></span>
                    </button>
                </div>
            </form>
            <div class="wizardProgress"></div>
        </div>
    </div>
</div>
