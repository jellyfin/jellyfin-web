name: Pull Request

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

on:
  pull_request:
    branches:
      - master
      - release*
    paths-ignore:
      - '**/*.md'
  merge_group:

jobs:
  build:
    name: Build 🏗️
    if: ${{ always() && !cancelled() }}
    uses: ./.github/workflows/__package.yml
    with:
      commit: ${{ github.event.pull_request.head.sha }}

  quality_checks:
    name: Quality checks 👌🧪
    if: ${{ always() && !cancelled() }}
    uses: ./.github/workflows/__quality_checks.yml
    permissions: {}
    with:
      commit: ${{ github.event.pull_request.head.sha }}

  codeql:
    name: GitHub CodeQL 🔬
    if: ${{ always() && !cancelled() }}
    uses: ./.github/workflows/__codeql.yml
    permissions:
      actions: read
      contents: read
      security-events: write
    with:
      commit: ${{ github.event.pull_request.head.sha }}

  run-eslint:
    name: Run eslint suggestions
    if: ${{ github.repository == 'jellyfin/jellyfin-web' }}
    runs-on: ubuntu-latest
    
    steps:
      - name: Check out Git repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ github.event.pull_request.head.sha }}
    
      - name: Setup node environment
        uses: actions/setup-node@395ad3262231945c25e8478fd5baf05154b1d79f # v6.1.0
        with:
          node-version-file: .nvmrc
          cache: npm
          check-latest: true 
    
      - name: Install Node.js dependencies
        run: npm ci --no-audit
    
      - name: Run eslint
        uses: CatChen/eslint-suggestion-action@4ee415529307a8ca0260b4a3775484802523e5af # v4.1.19
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
