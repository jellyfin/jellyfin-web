name: Scheduled tasks 🕑

on:
  schedule:
    - cron: '30 1 * * *'
  workflow_dispatch:
permissions:
  issues: write
  pull-requests: write

jobs:
  issues:
    name: Check stale issues and PRs
    runs-on: ubuntu-latest
    if: ${{ contains(github.repository, 'jellyfin/') }}
    steps:
      # Pass 1: Issues + conflict PRs (existing behavior, budget reduced to leave room for pass 2)
      - uses: actions/stale@b5d41d4e1d5dceea10e7104786b73624c18a190f # v10.2.0
        with:
          repo-token: ${{ secrets.JF_BOT_TOKEN }}
          operations-per-run: 45
          # Issues receive a stale warning after 120 days and close after an additional 21 days
          days-before-stale: 120
          days-before-close: 21
          exempt-issue-labels: regression,security,roadmap,future,feature,enhancement,confirmed
          stale-issue-label: stale
          stale-issue-message: |-
            This issue has gone 120 days without comment. To avoid abandoned issues, it will be closed in 21 days if there are no new comments.

            If you're the original submitter of this issue, please comment confirming if this issue still affects you in the latest release or master branch, or close the issue if it has been fixed. If you're another user also affected by this bug, please comment confirming so. Either action will remove the stale label.

            This bot exists to prevent issues from becoming stale and forgotten. Jellyfin is always moving forward, and bugs are often fixed as side effects of other changes. We therefore ask that bug report authors remain vigilant about their issues to ensure they are closed if fixed, or re-confirmed - perhaps with fresh logs or reproduction examples - regularly. If you have any questions you can reach us on [Matrix or Social Media](https://jellyfin.org/contact).
          # PRs are closed after having unresolved merge conflicts for 90 days
          days-before-pr-stale: 0
          days-before-pr-close: 90
          only-pr-labels: merge conflict
          stale-pr-label: stale
          close-pr-message: |-
            This PR has been closed due to having unresolved merge conflicts.
      # Pass 2: Inactive PRs — stale after 60 days of no activity, closed after 30 more days.
      # This handles the general PR backlog (conflict PRs are handled by pass 1 above).
      - uses: actions/stale@b5d41d4e1d5dceea10e7104786b73624c18a190f # v10.2.0
        with:
          repo-token: ${{ secrets.JF_BOT_TOKEN }}
          operations-per-run: 30
          # Do not touch issues in this pass
          days-before-issue-stale: -1
          days-before-issue-close: -1
          # PRs inactive for 60 days → stale warning; 30 more days → closed
          days-before-pr-stale: 60
          days-before-pr-close: 30
          exempt-pr-labels: blocked,needs testing,dependencies,security,discussion needed
          stale-pr-label: stale
          stale-pr-message: |-
            This pull request has been inactive for 60 days. To avoid an accumulation of abandoned PRs, it will be closed in 30 days if there is no new activity.

            If you are still working on this, please leave a comment with the current status or resolve any outstanding review feedback. This applies equally to draft PRs — if you need more time, a quick comment is enough to reset the timer.

            If closed, the branch is not deleted and the PR can be reopened at any time.
          close-pr-message: |-
            This pull request has been closed due to 90 days of inactivity (60 days to stale, 30 days to close). Your branch is not deleted — feel free to reopen if you'd like to continue this work and address any outstanding feedback.

            Thank you for contributing to Jellyfin!
